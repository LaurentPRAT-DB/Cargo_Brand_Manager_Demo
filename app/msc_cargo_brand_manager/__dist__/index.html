<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSC Cargo Brand Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes bounce-dot { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .dot-bounce { animation: bounce-dot 0.6s infinite; }
    .dot-bounce-1 { animation-delay: 0.1s; }
    .dot-bounce-2 { animation-delay: 0.2s; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- KPI Dashboard ---
    function Dashboard({ onNavigateChat }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch("/api/kpi/summary")
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
          .then(setData)
          .catch(e => setError(e.message))
          .finally(() => setLoading(false));
      }, []);

      const statusColors = {
        green: { bg: "bg-emerald-50", border: "border-emerald-200", text: "text-emerald-700", dot: "bg-emerald-500" },
        amber: { bg: "bg-amber-50", border: "border-amber-200", text: "text-amber-700", dot: "bg-amber-500" },
        red: { bg: "bg-red-50", border: "border-red-200", text: "text-red-700", dot: "bg-red-500" },
      };

      function fmt(v, u) {
        if (u === "%") return `${v}%`;
        if (u === "x") return `${v}x`;
        if (u === "#") return v.toLocaleString();
        return v.toString();
      }

      if (loading) return (
        <div className="p-8">
          <h2 className="text-2xl font-bold mb-6">KPI Dashboard</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {Array.from({length:9}).map((_,i) => <div key={i} className="h-32 bg-slate-100 animate-pulse rounded-lg"/>)}
          </div>
        </div>
      );

      if (error) return (
        <div className="p-8">
          <h2 className="text-2xl font-bold mb-4">KPI Dashboard</h2>
          <div className="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700">Failed to load: {error}</div>
        </div>
      );

      return (
        <div className="p-8">
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-2xl font-bold">KPI Dashboard</h2>
              <p className="text-sm text-slate-500">Reporting period: {data?.period}</p>
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {data?.kpis.map(kpi => {
              const c = statusColors[kpi.status];
              return (
                <button key={kpi.name} onClick={() => onNavigateChat(`Why is ${kpi.name} at ${fmt(kpi.value,kpi.unit)}?`)}
                  className={`${c.bg} ${c.border} border rounded-lg p-4 text-left hover:shadow-md transition-shadow cursor-pointer`}>
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-sm font-medium text-slate-600">{kpi.name}</span>
                    <span className={`w-2.5 h-2.5 rounded-full ${c.dot}`}/>
                  </div>
                  <div className={`text-2xl font-bold ${c.text}`}>{fmt(kpi.value, kpi.unit)}</div>
                  <div className="text-xs text-slate-500 mt-1">Target: {fmt(kpi.target,kpi.unit)} | Alert: &lt;{fmt(kpi.alert_threshold,kpi.unit)}</div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // --- Genie Chat ---
    function Chat({ initialQuestion }) {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState(initialQuestion || "");
      const [loading, setLoading] = useState(false);
      const [convId, setConvId] = useState(null);
      const endRef = useRef(null);

      useEffect(() => { endRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);

      // Auto-send initial question
      useEffect(() => {
        if (initialQuestion && messages.length === 0) {
          handleSend(initialQuestion);
        }
      }, []);

      async function handleSend(question) {
        const q = question || input.trim();
        if (!q || loading) return;
        setInput("");
        setMessages(prev => [...prev, {role:"user", content:q}]);
        setLoading(true);
        try {
          const endpoint = convId ? "/api/genie/followup" : "/api/genie/ask";
          const body = convId ? {conversation_id:convId, question:q} : {question:q};
          const resp = await fetch(endpoint, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
          const data = await resp.json();
          if (data.conversation_id) setConvId(data.conversation_id);
          setMessages(prev => [...prev, {role:"assistant", content:data.text_response||data.description||"Query completed.", sql:data.sql, columns:data.columns, data:data.data}]);
        } catch(e) {
          setMessages(prev => [...prev, {role:"assistant", content:`Error: ${e.message}`}]);
        } finally { setLoading(false); }
      }

      const suggestions = ["Why is NPS so low in South Asia?","Which campaign had the worst ROI?","How is our share of voice trending vs Maersk?"];

      return (
        <div className="flex flex-col h-full">
          <div className="p-4 border-b bg-white">
            <h2 className="text-lg font-bold">Ask Genie</h2>
            <p className="text-xs text-slate-500">Natural language questions about MSC Cargo brand performance</p>
          </div>
          <div className="flex-1 overflow-auto p-4 space-y-4">
            {messages.length === 0 && !initialQuestion && (
              <div className="text-center text-slate-400 mt-20">
                <p className="text-lg mb-4">Ask a question about your brand KPIs</p>
                <div className="space-y-2 text-sm">
                  {suggestions.map(q => (
                    <button key={q} onClick={() => {setInput(q); handleSend(q);}} className="block mx-auto px-3 py-1.5 bg-slate-100 rounded-full hover:bg-slate-200">{q}</button>
                  ))}
                </div>
              </div>
            )}
            {messages.map((msg,i) => (
              <div key={i} className={`flex ${msg.role==="user"?"justify-end":"justify-start"}`}>
                <div className={`max-w-[80%] rounded-lg p-3 ${msg.role==="user"?"bg-blue-600 text-white":"bg-white border shadow-sm"}`}>
                  <p className="text-sm whitespace-pre-wrap">{msg.content}</p>
                  {msg.sql && <details className="mt-2"><summary className="text-xs text-slate-500 cursor-pointer">Show SQL</summary><pre className="mt-1 text-xs bg-slate-50 p-2 rounded overflow-x-auto">{msg.sql}</pre></details>}
                  {msg.columns && msg.data && msg.data.length > 0 && (
                    <div className="mt-2 overflow-x-auto">
                      <table className="text-xs w-full border-collapse">
                        <thead><tr>{msg.columns.map(c=><th key={c} className="border-b px-2 py-1 text-left font-medium text-slate-600">{c}</th>)}</tr></thead>
                        <tbody>{msg.data.slice(0,10).map((row,ri)=><tr key={ri}>{row.map((cell,ci)=><td key={ci} className="border-b px-2 py-1">{cell}</td>)}</tr>)}</tbody>
                      </table>
                      {msg.data.length > 10 && <p className="text-xs text-slate-400 mt-1">Showing 10/{msg.data.length} rows</p>}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-white border shadow-sm rounded-lg p-3 flex space-x-1">
                  <div className="w-2 h-2 bg-slate-400 rounded-full dot-bounce"/>
                  <div className="w-2 h-2 bg-slate-400 rounded-full dot-bounce dot-bounce-1"/>
                  <div className="w-2 h-2 bg-slate-400 rounded-full dot-bounce dot-bounce-2"/>
                </div>
              </div>
            )}
            <div ref={endRef}/>
          </div>
          <div className="p-4 border-t bg-white">
            <div className="flex gap-2">
              <input type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSend()}
                placeholder="Ask about brand performance..." className="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" disabled={loading}/>
              <button onClick={()=>handleSend()} disabled={loading||!input.trim()} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">Send</button>
              {convId && <button onClick={()=>{setConvId(null);setMessages([]);}} className="px-3 py-2 border rounded-lg text-sm text-slate-600 hover:bg-slate-50">New</button>}
            </div>
          </div>
        </div>
      );
    }

    // --- Email Composer ---
    function Email() {
      const [recipient, setRecipient] = useState("");
      const [subject, setSubject] = useState("");
      const [context, setContext] = useState("");
      const [tone, setTone] = useState("professional");
      const [draft, setDraft] = useState("");
      const [loading, setLoading] = useState(false);
      const [copied, setCopied] = useState(false);

      async function generate() {
        if (!recipient||!subject||!context) return;
        setLoading(true); setDraft("");
        try {
          const resp = await fetch("/api/email/draft", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({recipient,subject,context,tone})});
          const data = await resp.json();
          setDraft(data.draft||"Failed to generate.");
        } catch(e) { setDraft(`Error: ${e.message}`); }
        finally { setLoading(false); }
      }

      return (
        <div className="p-8 max-w-5xl">
          <h2 className="text-2xl font-bold mb-2">Email Composer</h2>
          <p className="text-sm text-slate-500 mb-6">Generate professional emails with data-driven insights.</p>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="space-y-4">
              <div><label className="block text-sm font-medium text-slate-700 mb-1">Recipient</label>
                <input type="text" value={recipient} onChange={e=>setRecipient(e.target.value)} placeholder="e.g., Regional VP South Asia" className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
              <div><label className="block text-sm font-medium text-slate-700 mb-1">Subject</label>
                <input type="text" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="e.g., NPS Review — Action Required" className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
              <div><label className="block text-sm font-medium text-slate-700 mb-1">Tone</label>
                <select value={tone} onChange={e=>setTone(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm">
                  <option value="professional">Professional</option><option value="urgent">Urgent</option><option value="congratulatory">Congratulatory</option><option value="executive-summary">Executive Summary</option>
                </select></div>
              <div><label className="block text-sm font-medium text-slate-700 mb-1">Context / Data Points</label>
                <textarea value={context} onChange={e=>setContext(e.target.value)} rows={6} placeholder="Paste KPI data or Genie insights here..." className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
              <button onClick={generate} disabled={loading||!recipient||!subject||!context} className="w-full px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">
                {loading?"Generating...":"Generate Draft"}</button>
            </div>
            <div>
              <div className="flex items-center justify-between mb-2">
                <label className="text-sm font-medium text-slate-700">Email Preview</label>
                {draft && <button onClick={()=>{navigator.clipboard.writeText(draft);setCopied(true);setTimeout(()=>setCopied(false),2000);}} className="text-xs px-2 py-1 border rounded hover:bg-slate-50">{copied?"Copied!":"Copy"}</button>}
              </div>
              <div className="border rounded-lg p-4 min-h-[300px] bg-white">
                {draft ? <div className="text-sm whitespace-pre-wrap text-slate-700">{draft}</div> : <p className="text-sm text-slate-400 italic">Your email will appear here...</p>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- Campaign Planner ---
    function Campaigns() {
      const [campaigns, setCampaigns] = useState([]);
      const [loading, setLoading] = useState(true);
      const [budget, setBudget] = useState("200000");
      const [segment, setSegment] = useState("Freight Forwarders");
      const [product, setProduct] = useState("All Products");
      const [duration, setDuration] = useState("3");
      const [rec, setRec] = useState(null);
      const [recommending, setRecommending] = useState(false);

      useEffect(() => {
        fetch("/api/campaigns").then(r=>r.json()).then(setCampaigns).catch(()=>{}).finally(()=>setLoading(false));
      }, []);

      async function getRecommendation() {
        setRecommending(true); setRec(null);
        try {
          const resp = await fetch("/api/campaigns/recommend", {method:"POST", headers:{"Content-Type":"application/json"},
            body:JSON.stringify({budget_usd:parseFloat(budget),target_segment:segment,product_focus:product,duration_months:parseInt(duration)})});
          setRec(await resp.json());
        } catch(e) { setRec({allocations:[],total_expected_roi:0,summary:`Error: ${e.message}`}); }
        finally { setRecommending(false); }
      }

      return (
        <div className="p-8">
          <h2 className="text-2xl font-bold mb-6">Campaign Planner</h2>
          <div className="mb-8">
            <h3 className="text-lg font-semibold mb-3">Active Campaigns</h3>
            {loading ? <div className="h-32 bg-slate-100 animate-pulse rounded-lg"/> : (
              <div className="overflow-x-auto border rounded-lg">
                <table className="w-full text-sm">
                  <thead className="bg-slate-50"><tr>
                    <th className="px-3 py-2 text-left font-medium">Campaign</th>
                    <th className="px-3 py-2 text-left font-medium">Type</th>
                    <th className="px-3 py-2 text-left font-medium">Product</th>
                    <th className="px-3 py-2 text-left font-medium">Segment</th>
                    <th className="px-3 py-2 text-right font-medium">Budget</th>
                    <th className="px-3 py-2 text-left font-medium">Dates</th>
                  </tr></thead>
                  <tbody>{campaigns.map(c=>(
                    <tr key={c.campaign_id} className="border-t">
                      <td className="px-3 py-2 font-medium">{c.campaign_name}</td>
                      <td className="px-3 py-2">{c.campaign_type}</td>
                      <td className="px-3 py-2">{c.product_focus}</td>
                      <td className="px-3 py-2">{c.target_segment}</td>
                      <td className="px-3 py-2 text-right">${c.budget_usd?.toLocaleString()}</td>
                      <td className="px-3 py-2 text-xs">{c.start_date} → {c.end_date}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            )}
          </div>
          <div className="border rounded-lg p-6 bg-white">
            <h3 className="text-lg font-semibold mb-4">Plan New Campaign</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
              <div><label className="block text-xs font-medium text-slate-600 mb-1">Budget (USD)</label>
                <input type="number" value={budget} onChange={e=>setBudget(e.target.value)} className="w-full border rounded px-3 py-2 text-sm"/></div>
              <div><label className="block text-xs font-medium text-slate-600 mb-1">Target Segment</label>
                <select value={segment} onChange={e=>setSegment(e.target.value)} className="w-full border rounded px-3 py-2 text-sm">
                  <option>Freight Forwarders</option><option>Food & Pharma Exporters</option><option>New Prospects</option><option>Specialist Forwarders</option>
                </select></div>
              <div><label className="block text-xs font-medium text-slate-600 mb-1">Product Focus</label>
                <select value={product} onChange={e=>setProduct(e.target.value)} className="w-full border rounded px-3 py-2 text-sm">
                  <option>All Products</option><option>Reefer Cargo</option><option>Dry Container</option><option>DG Cargo</option>
                </select></div>
              <div><label className="block text-xs font-medium text-slate-600 mb-1">Duration</label>
                <select value={duration} onChange={e=>setDuration(e.target.value)} className="w-full border rounded px-3 py-2 text-sm">
                  <option value="1">1 month</option><option value="2">2 months</option><option value="3">3 months</option><option value="6">6 months</option>
                </select></div>
            </div>
            <button onClick={getRecommendation} disabled={recommending} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">
              {recommending?"Analyzing...":"Get AI Recommendation"}</button>
            {rec && (
              <div className="mt-6">
                <h4 className="font-medium mb-2">Recommended Channel Allocation</h4>
                {rec.allocations.length > 0 ? (
                  <div className="space-y-3">
                    {rec.allocations.map((a,i) => (
                      <div key={i} className="flex items-center gap-4 p-3 bg-slate-50 rounded">
                        <div className="w-32 font-medium text-sm">{a.channel_name}</div>
                        <div className="flex-1"><div className="h-2 bg-slate-200 rounded-full overflow-hidden"><div className="h-full bg-blue-500 rounded-full" style={{width:`${a.allocation_pct}%`}}/></div></div>
                        <div className="text-sm w-16 text-right">{a.allocation_pct}%</div>
                        <div className="text-sm w-24 text-right">${a.budget_usd?.toLocaleString()}</div>
                        <div className="text-sm w-16 text-right text-emerald-600">{a.expected_roi}x</div>
                      </div>
                    ))}
                    <div className="mt-4 p-3 bg-blue-50 border border-blue-200 rounded text-sm">
                      <strong>Expected Total ROI:</strong> {rec.total_expected_roi}x
                      <p className="mt-1 text-slate-600">{rec.summary}</p>
                    </div>
                  </div>
                ) : <p className="text-sm text-slate-500">{rec.summary}</p>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- App Shell ---
    function App() {
      const [page, setPage] = useState("dashboard");
      const [chatQuestion, setChatQuestion] = useState(null);

      const navItems = [
        {id:"dashboard", label:"KPI Dashboard", icon:"📊"},
        {id:"chat", label:"Ask Genie", icon:"💬"},
        {id:"email", label:"Email Composer", icon:"✉️"},
        {id:"campaigns", label:"Campaign Planner", icon:"🎯"},
      ];

      function navigateToChat(question) {
        setChatQuestion(question);
        setPage("chat");
      }

      return (
        <div className="flex h-screen">
          <nav className="w-64 bg-slate-900 text-white flex flex-col shrink-0">
            <div className="p-4 border-b border-slate-700">
              <h1 className="text-lg font-bold">MSC Cargo</h1>
              <p className="text-xs text-slate-400">Brand Manager</p>
            </div>
            <ul className="flex-1 p-2 space-y-1">
              {navItems.map(item => (
                <li key={item.id}>
                  <button onClick={()=>{setPage(item.id);if(item.id!=="chat")setChatQuestion(null);}}
                    className={`w-full text-left px-3 py-2 rounded-md text-sm flex items-center gap-2 transition-colors ${page===item.id?"bg-slate-700 text-white":"text-slate-300 hover:bg-slate-800"}`}>
                    <span>{item.icon}</span>{item.label}
                  </button>
                </li>
              ))}
            </ul>
            <div className="p-4 border-t border-slate-700 text-xs text-slate-500">v0.1.0 — Powered by Databricks</div>
          </nav>
          <main className="flex-1 overflow-auto">
            {page==="dashboard" && <Dashboard onNavigateChat={navigateToChat}/>}
            {page==="chat" && <Chat initialQuestion={chatQuestion}/>}
            {page==="email" && <Email/>}
            {page==="campaigns" && <Campaigns/>}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
